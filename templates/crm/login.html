{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Login — Health4Human Pharma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #f3f7fb;
      --surface: #ffffff;
      --border: #dbe3ee;
      --accent: #0f9f7a;
      --accent2: #3569e8;
      --text: #1f2937;
      --muted: #6b7280;
      --danger: #ff4d6d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(15,159,122,.14), transparent 35%),
        radial-gradient(circle at top right, rgba(53,105,232,.12), transparent 32%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shell { width: min(460px, 100%); }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(219,227,238,.9);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(16,24,40,.12);
      backdrop-filter: blur(10px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .brand img {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      object-fit: cover;
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.1; }
    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .alert { margin: 16px 0 0; padding: 12px 14px; border-radius: 12px; font-size: 13px; }
    .alert.error { background: rgba(255,77,109,.08); color: var(--danger); border: 1px solid rgba(255,77,109,.18); }
    .alert.info { background: rgba(53,105,232,.08); color: var(--accent2); border: 1px solid rgba(53,105,232,.18); }
    form { margin-top: 22px; display: grid; gap: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(53,105,232,.12); }
    .remember { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; }
    .remember input { width: 16px; height: 16px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .footer a { color: var(--accent2); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="brand">
        <img src="{% static 'images/HHP.jpg' %}" alt="Health4Human Pharma">
        <div>
          <h1>CRM Login</h1>
          <p class="subtitle">Sign in with your CRM role to access operations, sales, and analytics.</p>
        </div>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert {% if message.tags == 'error' %}error{% else %}info{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'crm_analytics:crm_login' %}">
        {% csrf_token %}
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" value="{{ username|default:'' }}" placeholder="Enter username" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required>
        </div>
        <label class="remember"><input type="checkbox" name="remember_me"> Remember me</label>
        <button class="btn" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Sign in to CRM</button>
      </form>

      <div class="footer">
        <span>Need website access?</span>
        <a href="{% url 'login' %}">Go to website login</a>
      </div>
    </div>
  </div>
</body>
</html>
